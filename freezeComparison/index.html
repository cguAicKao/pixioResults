<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型訓練結果可視化</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-container {
            position: relative;
            margin: auto;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800">模型效能對比分析 (Mean)</h1>
            <p class="text-gray-600 mt-2">比較 freeze-enc10 與 freeze-enc30 在不同 Epoch 的平均表現</p>
        </header>

        <div id="charts-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 圖表由 JavaScript 動態生成 -->
        </div>
    </div>

    <script>
        // 僅保留 Mean 數據
        const data = {
            "APTOS2019": {
                "enc10": [0.8302, 0.8356, 0.8296],
                "enc30": [0.8336, 0.8395, 0.8433]
            },
            "Glaucoma_fundus": {
                "enc10": [0.8353, 0.8275, 0.8318],
                "enc30": [0.8228, 0.8288, 0.8404]
            },
            "IDRiD_data": {
                "enc10": [0.5068, 0.5204, 0.4816],
                "enc30": [0.4777, 0.4913, 0.4990]
            },
            "MESSIDOR2": {
                "enc10": [0.6875, 0.7114, 0.7004],
                "enc30": [0.7030, 0.7087, 0.7122]
            },
            "PAPILA": {
                "enc10": [0.7694, 0.7531, 0.7735],
                "enc30": [0.7857, 0.7714, 0.7612]
            },
            "Retina": {
                "enc10": [0.6210, 0.6099, 0.5978],
                "enc30": [0.6088, 0.6099, 0.5934]
            }
        };

        const epochs = ['Epoch 10', 'Epoch 20', 'Epoch 30'];
        const grid = document.getElementById('charts-grid');

        Object.keys(data).forEach(datasetName => {
            const card = document.createElement('div');
            card.className = 'bg-white p-6 rounded-xl shadow-sm border border-gray-200';
            card.innerHTML = `
                <h2 class="text-xl font-bold mb-4 text-gray-700 border-b pb-2">${datasetName}</h2>
                <div class="chart-container">
                    <canvas id="chart-${datasetName}"></canvas>
                </div>
            `;
            grid.appendChild(card);

            const ctx = document.getElementById(`chart-${datasetName}`).getContext('2d');
            const datasetInfo = data[datasetName];

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: epochs,
                    datasets: [
                        {
                            label: 'Freeze-Enc10',
                            data: datasetInfo.enc10,
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            fill: false,
                            tension: 0.1,
                            pointRadius: 5,
                            borderWidth: 2
                        },
                        {
                            label: 'Freeze-Enc30',
                            data: datasetInfo.enc30,
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            fill: false,
                            tension: 0.1,
                            pointRadius: 5,
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: { display: true, text: 'Mean Accuracy' }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>

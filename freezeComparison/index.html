<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型訓練結果可視化</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-container {
            position: relative;
            margin: auto;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800">模型效能對比分析 (Mean ± Std)</h1>
            <p class="text-gray-600 mt-2">比較 freeze-enc10 與 freeze-enc30 在不同 Epoch 的準確度與 AUROC 表現</p>
        </header>

        <div id="charts-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 圖表會由 JavaScript 動態生成 -->
        </div>

        <!-- 數據分佈圖表 -->
        <div class="mt-12 pt-8 border-t-2 border-gray-300">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">數據集樣本分佈統計</h2>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200" style="position: relative; height: 400px;">
                <canvas id="distributionChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const data = {
            "APTOS2019": {
                "accuracy_enc10": { mean: [0.8302, 0.8296, 0.8355, 0.8338, 0.8367, 0.8313], std: [0.0085, 0.0050, 0.0091, 0.0068, 0.0078, 0.0046] },
                "accuracy_enc30": { mean: [0.8336, 0.8429, 0.8389, null, null, null], std: [0.0058, 0.0040, 0.0145, null, null, null] },
                "auroc_enc10": { mean: [0.9393, 0.9399, 0.9435, 0.9430, 0.9421, 0.9419], std: [0.0010, 0.0021, 0.0029, 0.0032, 0.0019, 0.0032] },
                "auroc_enc30": { mean: [0.9424, 0.9439, 0.9450, null, null, null], std: [0.0011, 0.0025, 0.0022, null, null, null] }
            },
            "Glaucoma_fundus": {
                "accuracy_enc10": { mean: [0.8353, 0.8284, 0.8422, 0.8422, 0.8477, 0.8551], std: [0.0056, 0.0072, 0.0052, 0.0089, 0.0093, 0.0058] },
                "accuracy_enc30": { mean: [0.8228, 0.8292, 0.8422, null, null, null], std: [0.0113, 0.0077, 0.0042, null, null, null] },
                "auroc_enc10": { mean: [0.9468, 0.9389, 0.9470, 0.9464, 0.9475, 0.9533], std: [0.0015, 0.0036, 0.0017, 0.0039, 0.0031, 0.0025] },
                "auroc_enc30": { mean: [0.9393, 0.9354, 0.9479, null, null, null], std: [0.0068, 0.0026, 0.0030, null, null, null] }
            },
            "IDRiD_data": {
                "accuracy_enc10": { mean: [0.5068, 0.5398, 0.5301, 0.5146, 0.5204, 0.5495], std: [0.0397, 0.0253, 0.0288, 0.0266, 0.0176, 0.0147] },
                "accuracy_enc30": { mean: [0.4777, 0.5068, 0.5184, null, null, null], std: [0.0294, 0.0187, 0.0443, null, null, null] },
                "auroc_enc10": { mean: [0.7678, 0.7751, 0.7895, 0.7906, 0.7815, 0.7981], std: [0.0215, 0.0128, 0.0055, 0.0133, 0.0098, 0.0149] },
                "auroc_enc30": { mean: [0.7856, 0.7799, 0.7870, null, null, null], std: [0.0171, 0.0060, 0.0149, null, null, null] }
            },
            "MESSIDOR2": {
                "accuracy_enc10": { mean: [0.6875, 0.7114, 0.7057, 0.6977, 0.6939, 0.7137], std: [0.0129, 0.0118, 0.0126, 0.0100, 0.0203, 0.0119] },
                "accuracy_enc30": { mean: [0.7030, 0.6996, 0.6992, null, null, null], std: [0.0092, 0.0223, 0.0148, null, null, null] },
                "auroc_enc10": { mean: [0.8737, 0.8732, 0.8784, 0.8740, 0.8744, 0.8867], std: [0.0009, 0.0053, 0.0038, 0.0057, 0.0083, 0.0047] },
                "auroc_enc30": { mean: [0.8791, 0.8758, 0.8780, null, null, null], std: [0.0031, 0.0073, 0.0033, null, null, null] }
            },
            "PAPILA": {
                "accuracy_enc10": { mean: [0.7694, 0.7531, 0.7612, 0.7776, 0.7673, 0.7714], std: [0.0303, 0.0196, 0.0116, 0.0085, 0.0085, 0.0185] },
                "accuracy_enc30": { mean: [0.7857, 0.7531, 0.7878, null, null, null], std: [0.0250, 0.0151, 0.0085, null, null, null] },
                "auroc_enc10": { mean: [0.7744, 0.8163, 0.8035, 0.8121, 0.8260, 0.8193], std: [0.0323, 0.0253, 0.0375, 0.0417, 0.0275, 0.0231] },
                "auroc_enc30": { mean: [0.8334, 0.7830, 0.8170, null, null, null], std: [0.0271, 0.0356, 0.0185, null, null, null] }
            },
            "Retina": {
                "accuracy_enc10": { mean: [0.6210, 0.6155, 0.6630, 0.6254, 0.6298, 0.6630], std: [0.0223, 0.0441, 0.0295, 0.0236, 0.0110, 0.0284] },
                "accuracy_enc30": { mean: [0.6088, 0.6552, 0.6276, null, null, null], std: [0.0072, 0.0501, 0.0342, null, null, null] },
                "auroc_enc10": { mean: [0.7910, 0.8268, 0.8586, 0.8332, 0.8529, 0.8623], std: [0.0109, 0.0379, 0.0167, 0.0224, 0.0109, 0.0200] },
                "auroc_enc30": { mean: [0.7978, 0.8574, 0.8510, null, null, null], std: [0.0176, 0.0456, 0.0211, null, null, null] }
            }
        };

        const epochs = ['Epoch 10', 'Epoch 60', 'Epoch 80', 'Epoch 140', 'Epoch 160', 'Epoch 180'];
        const grid = document.getElementById('charts-grid');

        Object.keys(data).forEach(datasetName => {
            const datasetInfo = data[datasetName];
            
            // Accuracy Chart
            const accCard = document.createElement('div');
            accCard.className = 'bg-white p-6 rounded-xl shadow-sm border border-gray-200';
            accCard.innerHTML = `
                <h2 class="text-xl font-bold mb-4 text-gray-700 border-b pb-2">${datasetName} - Accuracy</h2>
                <div class="chart-container">
                    <canvas id="chart-acc-${datasetName}"></canvas>
                </div>
            `;
            grid.appendChild(accCard);

            const accCtx = document.getElementById(`chart-acc-${datasetName}`).getContext('2d');

            new Chart(accCtx, {
                type: 'line',
                data: {
                    labels: epochs,
                    datasets: [
                        {
                            label: 'Accuracy-Enc10',
                            data: datasetInfo.accuracy_enc10.mean,
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            fill: false,
                            tension: 0.1,
                            pointStyle: 'circle',
                            pointRadius: 6
                        },
                        {
                            label: 'Accuracy-Enc30',
                            data: datasetInfo.accuracy_enc30.mean,
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            fill: false,
                            tension: 0.1,
                            pointStyle: 'rect',
                            pointRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const ds = context.datasetIndex === 0 ? 'accuracy_enc10' : 'accuracy_enc30';
                                    const mean = datasetInfo[ds].mean[context.dataIndex];
                                    const std = datasetInfo[ds].std[context.dataIndex];
                                    return `${context.dataset.label}: ${mean.toFixed(4)} ± ${std.toFixed(4)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: { display: true, text: 'Accuracy' }
                        }
                    }
                }
            });
            
            // AUROC Chart
            const aurocCard = document.createElement('div');
            aurocCard.className = 'bg-white p-6 rounded-xl shadow-sm border border-gray-200';
            aurocCard.innerHTML = `
                <h2 class="text-xl font-bold mb-4 text-gray-700 border-b pb-2">${datasetName} - AUROC</h2>
                <div class="chart-container">
                    <canvas id="chart-auroc-${datasetName}"></canvas>
                </div>
            `;
            grid.appendChild(aurocCard);

            const aurocCtx = document.getElementById(`chart-auroc-${datasetName}`).getContext('2d');

            new Chart(aurocCtx, {
                type: 'line',
                data: {
                    labels: epochs,
                    datasets: [
                        {
                            label: 'AUROC-Enc10',
                            data: datasetInfo.auroc_enc10.mean,
                            borderColor: 'rgba(75, 192, 75, 1)',
                            backgroundColor: 'rgba(75, 192, 75, 0.1)',
                            fill: false,
                            tension: 0.1,
                            pointStyle: 'circle',
                            pointRadius: 6
                        },
                        {
                            label: 'AUROC-Enc30',
                            data: datasetInfo.auroc_enc30.mean,
                            borderColor: 'rgba(255, 159, 64, 1)',
                            backgroundColor: 'rgba(255, 159, 64, 0.1)',
                            fill: false,
                            tension: 0.1,
                            pointStyle: 'rect',
                            pointRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const ds = context.datasetIndex === 0 ? 'auroc_enc10' : 'auroc_enc30';
                                    const mean = datasetInfo[ds].mean[context.dataIndex];
                                    const std = datasetInfo[ds].std[context.dataIndex];
                                    return `${context.dataset.label}: ${mean.toFixed(4)} ± ${std.toFixed(4)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: { display: true, text: 'AUROC' }
                        }
                    }
                }
            });
        });

        // 樣本分佈數據 (用於分佈圖)
        const statsBase = [
            { name: 'APTOS2019', train: 2048, val: 514, test: 1100 },
            { name: 'MESSIDOR2', train: 972, val: 246, test: 526 },
            { name: 'Glaucoma Fundus', train: 861, val: 218, test: 465 },
            { name: 'Retina', train: 336, val: 84, test: 181 },
            { name: 'IDRiD Data', train: 329, val: 84, test: 103 },
            { name: 'PAPILA', train: 311, val: 79, test: 98 }
        ];

        // 數據分佈圖表
        new Chart(document.getElementById('distributionChart'), {
            type: 'bar',
            data: {
                labels: statsBase.map(s => s.name),
                datasets: [
                    { label: 'Training', data: statsBase.map(s => s.train), backgroundColor: '#3b82f6' },
                    { label: 'Validation', data: statsBase.map(s => s.val), backgroundColor: '#60a5fa' },
                    { label: 'Test', data: statsBase.map(s => s.test), backgroundColor: '#93c5fd' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { position: 'top' },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: { 
                    x: { stacked: true }, 
                    y: { stacked: true, beginAtZero: true }
                }
            }
        });
    </script>
</body>
</html>

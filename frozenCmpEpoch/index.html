<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫療 AI 實驗數據可視化</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 核心 (使用穩定版本) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- 載入 Prop-Types (Recharts 依賴) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <!-- 載入 Recharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <!-- 載入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .recharts-cartesian-grid-horizontal line, .recharts-cartesian-grid-vertical line {
            stroke: #f1f5f9;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, 
            ResponsiveContainer, ErrorBar, BarChart, Bar, LabelList 
        } = Recharts;

        const App = () => {
            const [activeMetric, setActiveMetric] = useState('accuracy');

            const statsBase = [
                { name: 'APTOS2019', train: 2048, val: 514, test: 1100, total: 3662 },
                { name: 'MESSIDOR2', train: 972, val: 246, test: 526, total: 1744 },
                { name: 'Glaucoma Fundus', train: 861, val: 218, test: 465, total: 1544 },
                { name: 'Retina', train: 336, val: 84, test: 181, total: 601 },
                { name: 'IDRiD Data', train: 329, val: 84, test: 103, total: 516 },
                { name: 'PAPILA', train: 311, val: 79, test: 98, total: 488 }
            ];

            const performanceData = {
                accuracy: [
                    { name: 'APTOS2019', epochs: [{ e: 10, mean: 0.82636, std: 0.00649 }, { e: 20, mean: 0.8315, std: 0.0069 }, { e: 30, mean: 0.8333, std: 0.0089 }, { e: 40, mean: 0.8282, std: 0.0092 }, { e: 60, mean: 0.8282, std: 0.0068 }] },
                    { name: 'MESSIDOR2', epochs: [{ e: 10, mean: 0.72281, std: 0.00945 }, { e: 20, mean: 0.7019, std: 0.0058 }, { e: 30, mean: 0.7186, std: 0.0101 }, { e: 40, mean: 0.7171, std: 0.0078 }, { e: 60, mean: 0.7015, std: 0.0088 }] },
                    { name: 'Glaucoma Fundus', epochs: [{ e: 10, mean: 0.76559, std: 0.01054 }, { e: 20, mean: 0.8082, std: 0.0074 }, { e: 30, mean: 0.8004, std: 0.0119 }, { e: 40, mean: 0.8026, std: 0.0141 }, { e: 60, mean: 0.7794, std: 0.0077 }] },
                    { name: 'Retina', epochs: [{ e: 10, mean: 0.59669, std: 0.01105 }, { e: 20, mean: 0.5834, std: 0.0092 }, { e: 30, mean: 0.5779, std: 0.0154 }, { e: 40, mean: 0.5669, std: 0.0249 }, { e: 60, mean: 0.5823, std: 0.0100 }] },
                    { name: 'IDRiD Data', epochs: [{ e: 10, mean: 0.47767, std: 0.09572 }, { e: 20, mean: 0.4641, std: 0.0447 }, { e: 30, mean: 0.4738, std: 0.0359 }, { e: 40, mean: 0.4932, std: 0.0511 }, { e: 60, mean: 0.5010, std: 0.0483 }] },
                    { name: 'PAPILA', epochs: [{ e: 10, mean: 0.72245, std: 0.05173 }, { e: 20, mean: 0.7429, std: 0.0697 }, { e: 30, mean: 0.7653, std: 0.0191 }, { e: 40, mean: 0.7592, std: 0.0212 }, { e: 60, mean: 0.7449, std: 0.0216 }] }
                ],
                auroc: [
                    { name: 'APTOS2019', epochs: [{ e: 10, mean: 0.94035, std: 0.00223 }, { e: 20, mean: 0.9397, std: 0.0020 }, { e: 30, mean: 0.9415, std: 0.0016 }, { e: 40, mean: 0.9394, std: 0.0010 }, { e: 60, mean: 0.9397, std: 0.0026 }] },
                    { name: 'MESSIDOR2', epochs: [{ e: 10, mean: 0.88527, std: 0.00553 }, { e: 20, mean: 0.8778, std: 0.0031 }, { e: 30, mean: 0.8828, std: 0.0035 }, { e: 40, mean: 0.8847, std: 0.0046 }, { e: 60, mean: 0.8731, std: 0.0105 }] },
                    { name: 'Glaucoma Fundus', epochs: [{ e: 10, mean: 0.90455, std: 0.00349 }, { e: 20, mean: 0.9201, std: 0.0042 }, { e: 30, mean: 0.9214, std: 0.0035 }, { e: 40, mean: 0.9215, std: 0.0043 }, { e: 60, mean: 0.9115, std: 0.0037 }] },
                    { name: 'Retina', epochs: [{ e: 10, mean: 0.71609, std: 0.01280 }, { e: 20, mean: 0.7070, std: 0.0047 }, { e: 30, mean: 0.7018, std: 0.0083 }, { e: 40, mean: 0.7025, std: 0.0112 }, { e: 60, mean: 0.6935, std: 0.0155 }] },
                    { name: 'IDRiD Data', epochs: [{ e: 10, mean: 0.79143, std: 0.02645 }, { e: 20, mean: 0.7910, std: 0.0183 }, { e: 30, mean: 0.7949, std: 0.0156 }, { e: 40, mean: 0.7941, std: 0.0095 }, { e: 60, mean: 0.8016, std: 0.0172 }] },
                    { name: 'PAPILA', epochs: [{ e: 10, mean: 0.71449, std: 0.03603 }, { e: 20, mean: 0.7331, std: 0.0179 }, { e: 30, mean: 0.7159, std: 0.0150 }, { e: 40, mean: 0.7279, std: 0.0219 }, { e: 60, mean: 0.7105, std: 0.0288 }] }
                ]
            };

            const colors = ['#2563eb', '#dc2626', '#16a34a', '#d97706', '#7c3aed', '#0891b2'];

            const lineChartData = useMemo(() => {
                const epochs = [10, 20, 30, 40, 60];
                return epochs.map(epoch => {
                    const row = { epoch: `Epoch ${epoch}` };
                    statsBase.forEach(stat => {
                        const dataset = performanceData[activeMetric].find(d => d.name === stat.name);
                        if (dataset) {
                            const target = dataset.epochs.find(d => d.e === epoch);
                            if (target) {
                                row[stat.name] = target.mean;
                                row[`${stat.name}_std`] = target.std;
                            }
                        }
                    });
                    return row;
                });
            }, [activeMetric]);

            const CustomTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    return (
                        <div className="bg-white p-4 border border-slate-200 rounded-lg shadow-xl text-sm z-50">
                            <p className="font-bold text-slate-800 mb-2 border-b pb-1 text-center">{label}</p>
                            {payload.map((entry, index) => (
                                <div key={index} className="flex items-center justify-between gap-6 py-1">
                                    <div className="flex items-center gap-2">
                                        <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: entry.color }} />
                                        <span className="text-slate-600 font-medium">{entry.name}:</span>
                                    </div>
                                    <span className="font-mono font-bold text-slate-900">
                                        {entry.value.toFixed(4)} 
                                        {entry.payload[`${entry.name}_std`] !== undefined && (
                                            <span className="text-slate-400 font-normal ml-1 text-xs">±{entry.payload[`${entry.name}_std`].toFixed(4)}</span>
                                        )}
                                    </span>
                                </div>
                            ))}
                        </div>
                    );
                }
                return null;
            };

            return (
                <div className="min-h-screen bg-[#f8fafc] p-4 md:p-10">
                    <div className="max-w-6xl mx-auto space-y-12 pb-20">
                        
                        <section>
                            <div className="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-6">
                                <div className="space-y-2">
                                    <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">凍結策略性能對比</h1>
                                </div>
                                <div className="inline-flex bg-slate-200 p-1 rounded-xl">
                                    {['accuracy', 'auroc'].map(m => (
                                        <button
                                            key={m}
                                            onClick={() => setActiveMetric(m)}
                                            className={`px-6 py-2.5 rounded-lg text-sm font-bold transition-all ${activeMetric === m ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}
                                        >
                                            {m.toUpperCase()}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                                <div className="h-[550px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={lineChartData} margin={{ top: 30, right: 30, left: 10, bottom: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={true} />
                                            <XAxis dataKey="epoch" axisLine={false} tickLine={true} tick={{ fill: '#475569', fontWeight: 'bold' }} />
                                            <YAxis 
                                                domain={activeMetric === 'accuracy' ? [0.4, 0.95] : [0.65, 1.0]} 
                                                axisLine={true} 
                                                tickLine={true} 
                                                tickCount={10}
                                                tickFormatter={(val) => val.toFixed(2)} 
                                            />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Legend verticalAlign="top" height={50} align="center" />
                                            {statsBase.map((stat, idx) => (
                                                <Line 
                                                    key={stat.name} 
                                                    type="monotone" 
                                                    dataKey={stat.name} 
                                                    stroke={colors[idx]} 
                                                    strokeWidth={3} 
                                                    connectNulls={true}
                                                    dot={{ r: 5, fill: colors[idx], strokeWidth: 2, stroke: '#fff' }}
                                                    isAnimationActive={false}
                                                >
                                                    <LabelList dataKey={stat.name} position="top" offset={10} style={{ fontSize: '10px', fill: colors[idx], fontWeight: 'bold' }} formatter={(v) => v ? v.toFixed(3) : ''} />
                                                    <ErrorBar dataKey={`${stat.name}_std`} width={4} strokeWidth={1.5} stroke={colors[idx]} opacity={0.4} />
                                                </Line>
                                            ))}
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </section>

                        <section>
                            <h2 className="text-3xl font-extrabold text-slate-900 mb-6">數據集樣本規模統計</h2>
                            <div className="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                                <div className="h-[450px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={statsBase} margin={{ top: 40, right: 30, left: 20, bottom: 60 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                            <XAxis 
                                                dataKey="name" 
                                                axisLine={false} 
                                                tickLine={true} 
                                                tick={{ fill: '#1e293b', fontWeight: 'bold' }} 
                                                interval={0}
                                                angle={-15}
                                                textAnchor="end"
                                            />
                                            <YAxis axisLine={true} tickLine={true} />
                                            <Tooltip cursor={{fill: '#f8fafc', opacity: 0.5}} content={<CustomTooltip />} />
                                            <Legend verticalAlign="top" align="center" wrapperStyle={{ paddingBottom: '30px' }} />
                                            <Bar dataKey="train" name="Training" stackId="a" fill="#2563eb" barSize={50} />
                                            <Bar dataKey="val" name="Validation" stackId="a" fill="#60a5fa" />
                                            <Bar dataKey="test" name="Testing" stackId="a" fill="#cbd5e1" radius={[10, 10, 0, 0]}>
                                                <LabelList dataKey="total" position="top" offset={10} style={{ fill: '#1e293b', fontWeight: '800', fontSize: '14px' }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </section>

                        <footer className="text-center text-slate-400 text-xs tracking-widest uppercase py-10">
                            Medical Imaging Research © 2024
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
